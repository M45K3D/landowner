name: Monthly CCOD Data Update

on:
  schedule:
    - cron: '0 2 5 * *'
  workflow_dispatch:

jobs:
  update-ccod:
    name: Download & Import CCOD Data
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get CCOD filename from HMLR API
        run: |
          echo "Getting CCOD dataset metadata..."
          METADATA=$(curl -s \
            -H "Authorization: ${{ secrets.HMLR_API_KEY }}" \
            -H "Accept: application/json" \
            "https://use-land-property-data.service.gov.uk/api/v1/datasets/ccod")
          echo "Metadata: $METADATA"
          FILENAME=$(echo $METADATA | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          resources = data['result']['resources']
          full = [r for r in resources if 'FULL' in r['file_name']]
          print(full[0]['file_name'])
          ")
          echo "CCOD filename: $FILENAME"
          echo "CCOD_FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Get download URL and download CCOD
        run: |
          echo "Getting download URL for ${{ env.CCOD_FILENAME }}..."
          DOWNLOAD_JSON=$(curl -s \
            -H "Authorization: ${{ secrets.HMLR_API_KEY }}" \
            -H "Accept: application/json" \
            "https://use-land-property-data.service.gov.uk/api/v1/datasets/ccod/${{ env.CCOD_FILENAME }}")
          echo "Download response: $DOWNLOAD_JSON"
          DOWNLOAD_URL=$(echo $DOWNLOAD_JSON | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['result']['download_url'])
          ")
          echo "Downloading from S3..."
          curl -L -o /tmp/ccod_full.zip "$DOWNLOAD_URL"
          ls -lh /tmp/ccod_full.zip
          unzip -o /tmp/ccod_full.zip -d /tmp/ccod/
          CCOD_FILE=$(find /tmp/ccod/ -name "*.csv" | head -1)
          echo "Found CSV: $CCOD_FILE"
          echo "CCOD_FILE=$CCOD_FILE" >> $GITHUB_ENV

      - name: Import CCOD data into Neon PostgreSQL
        run: node scripts/import-ccod.js "${{ env.CCOD_FILE }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Rebuild search indexes
        run: node scripts/rebuild-indexes.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify row count post-import
        run: |
          node -e "
            const { Pool } = require('pg');
            const pool = new Pool({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            pool.query('SELECT COUNT(*) FROM ccod_properties').then(r => {
              console.log('Row count:', r.rows[0].count);
              pool.end();
            }).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}