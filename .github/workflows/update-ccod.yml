name: Monthly CCOD Data Update

on:
  schedule:
    - cron: '0 2 5 * *'
  workflow_dispatch:

jobs:
  update-ccod:
    name: Download & Import CCOD Data
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download CCOD via HMLR API
        run: |
          echo "Getting filename..."
          FILENAME=$(curl -s \
            -H "Authorization: ${{ secrets.HMLR_API_KEY }}" \
            -H "Accept: application/json" \
            "https://use-land-property-data.service.gov.uk/api/v1/datasets/ccod" | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          resources = data['result']['resources']
          full = [r for r in resources if 'FULL' in r['file_name']]
          print(full[0]['file_name'])
          ")
          echo "Filename: $FILENAME"
          echo "Getting download URL and downloading immediately..."
          curl -s \
            -H "Authorization: ${{ secrets.HMLR_API_KEY }}" \
            -H "Accept: application/json" \
            "https://use-land-property-data.service.gov.uk/api/v1/datasets/ccod/$FILENAME" | \
            python3 -c "
          import sys, json, subprocess
          data = json.load(sys.stdin)
          url = data['result']['download_url']
          print('Downloading from:', url[:80])
          result = subprocess.run(['curl', '-L', '-o', '/tmp/ccod_full.zip', url], capture_output=False)
          sys.exit(result.returncode)
          "
          ls -lh /tmp/ccod_full.zip
          unzip -o /tmp/ccod_full.zip -d /tmp/ccod/
          CCOD_FILE=$(find /tmp/ccod/ -name "*.csv" | head -1)
          echo "Found CSV: $CCOD_FILE"
          echo "CCOD_FILE=$CCOD_FILE" >> $GITHUB_ENV

      - name: Import CCOD data into Neon PostgreSQL
        run: node scripts/import-ccod.js "${{ env.CCOD_FILE }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Rebuild search indexes
        run: node scripts/rebuild-indexes.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify row count post-import
        run: |
          node -e "
            const { Pool } = require('pg');
            const pool = new Pool({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            pool.query('SELECT COUNT(*) FROM ccod_properties').then(r => {
              console.log('Row count:', r.rows[0].count);
              pool.end();
            }).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
